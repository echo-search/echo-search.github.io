<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Echo AI Embed</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  padding: 12px;
}

/* Container */
#card {
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.08);
  animation: fadeIn 0.4s ease;
}

/* Title */
#title {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

/* Answer text */
#answer {
  font-size: 15px;
  line-height: 1.6;
}

/* Code blocks */
pre {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
  overflow-x: auto;
  font-size: 13px;
  margin-top: 10px;
  border: 1px solid rgba(255,255,255,0.08);
}

code {
  color: #38bdf8;
}

/* Loading shimmer */
.loading {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.05) 25%,
    rgba(255,255,255,0.15) 50%,
    rgba(255,255,255,0.05) 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  margin-bottom: 8px;
}

/* Animations */
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div id="card">
  <div id="title">Echo AI</div>
  <div id="answer">
    <div class="loading"></div>
    <div class="loading" style="width:80%"></div>
    <div class="loading" style="width:60%"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const query = params.get("q");

async function run() {
  if (!query) {
    document.getElementById("answer").innerText = "No query provided.";
    return;
  }

  try {
    const res = await fetch("https://jav-ai.netlify.app/.netlify/functions/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: [
          {
            role: "system",
            content: "Give short, clear answers like a search engine AI overview. No star symbols or hash symbols."
          },
          {
            role: "user",
            content: query
          }
        ]
      })
    });

    const data = await res.json();

    document.getElementById("answer").innerHTML =
      formatMessage(data.reply || "No response from AI.");

    resize();

  } catch (e) {
    document.getElementById("answer").innerText = "Error loading AI.";
  }
}

function formatMessage(text) {
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // code blocks
  text = text.replace(/```([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code}</code></pre>`
  );

  // bold formatting
  text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

  // paragraphs + line breaks
  text = text.replace(/\n\n+/g, "</p><p>");
  text = text.replace(/\n/g, "<br>");

  return `<p>${text}</p>`;
}

/* Resize iframe smoothly */
function resize() {
  setTimeout(() => {
    window.parent.postMessage(
      { height: document.body.scrollHeight },
      "*"
    );
  }, 100);
}

run();
</script>

</body>
</html>
