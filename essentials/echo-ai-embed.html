<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Echo AI Embed</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #000;
  color: #fff;
  padding: 12px;
}

/* Container */
#card {
  background: #000;
  border-radius: 16px;
  padding: 16px;
  border: 1px solid #222;
  animation: fadeIn 0.4s ease;
}

/* Title */
#title {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

/* Answer text */
#answer {
  font-size: 15px;
  line-height: 1.6;
}

/* Code blocks */
pre {
  background: #0a0a0a;
  padding: 12px;
  border-radius: 10px;
  overflow-x: auto;
  font-size: 13px;
  margin-top: 10px;
  border: 1px solid #222;
}

code {
  color: #fff;
}

/* Loading shimmer */
.loading {
  height: 14px;
  border-radius: 6px;
  background: linear-gradient(
    90deg,
    #111 25%,
    #222 50%,
    #111 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  margin-bottom: 8px;
}

/* Animations */
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div id="card">
  <div id="title">AI Overview</div>
  <div id="answer">
    <div class="loading"></div>
    <div class="loading" style="width:80%"></div>
    <div class="loading" style="width:60%"></div>
  </div>
</div>

<script>
if (
  !document.referrer.startsWith("https://echo-search.github.io/") &&
  !document.referrer.startsWith("https://echo-search.github.io/safesearch/")
) {
  document.body.innerHTML = "This embed is not allowed.";
  throw new Error("Unauthorized iframe");
}

const params = new URLSearchParams(window.location.search);
const query = params.get("q");

async function run() {
  if (!query) {
    document.getElementById("answer").innerText = "No query provided.";
    return;
  }

  try {
    const res = await fetch("https://jav-ai.netlify.app/.netlify/functions/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: [
          {
            role: "system",
            content: "Give short, clear answers like a search engine AI overview. No star symbols or hash symbols."
          },
          {
            role: "user",
            content: query
          }
        ]
      })
    });

    const data = await res.json();

    document.getElementById("answer").innerHTML =
      formatMessage(data.reply || "No response from AI.");

    resize();

  } catch (e) {
    document.getElementById("answer").innerText = "Error loading AI.";
  }
}

function formatMessage(text) {
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  text = text.replace(/```([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code}</code></pre>`
  );

  text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

  // Replace * at start of lines or after newlines with bullet point
  text = text.replace(/(^|\n)\s*\*\s+/g, "$1• ");

  text = text.replace(/\n\n+/g, "</p><p>");
  text = text.replace(/\n/g, "<br>");

  return `<p>${text}</p>`;
}

function resize() {
  setTimeout(() => {
    window.parent.postMessage(
      { height: document.body.scrollHeight },
      "*"
    );
  }, 100);
}

run();
</script>

</body>
</html>
