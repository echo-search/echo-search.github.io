<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Echo AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ===================== GLOBAL ===================== */
body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ===================== SIDEBAR ===================== */
#sidebar {
  width: 330px;
  background: #0d0d0d;
  border-right: 1px solid #222;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 16px;
  position: relative;
  transition: transform 0.3s ease;
}

#sidebar.hidden {
  transform: translateX(-330px);
}

.sidebar-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
}

/* Search bar */
#searchBox {
  width: 100%;
  padding: 10px 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: #fff;
  margin-bottom: 20px;
  font-size: 15px;
}

.section-label {
  margin: 25px 0 8px 0;
  text-transform: uppercase;
  font-size: 12px;
  opacity: 0.6;
}

.sidebar-item {
  padding: 10px 12px;
  border-radius: 10px;
  background: #141414;
  margin-bottom: 8px;
  cursor: pointer;
}

.sidebar-item:hover {
  background: #1f1f1f;
}

#newChatBtn {
  position: absolute;
  bottom: 20px;
  left: 16px;
  width: 290px;
  background: #fff;
  color: #000;
  padding: 12px;
  border-radius: 100px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
}

/* ===================== MAIN AREA ===================== */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Top bar */
#topbar {
  height: 52px;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
}

.top-btn {
  font-size: 26px;
  cursor: pointer;
  opacity: 0.8;
}

.top-btn:hover {
  opacity: 1;
}

/* Chat area */
#chatArea {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
}

/* User bubble */
.msg.user {
  display: flex;
  justify-content: flex-end;
  margin: 14px 0;
}

.user .bubble {
  max-width: 60%;
  background: #1a1a1d;
  padding: 12px 16px;
  border-radius: 22px 22px 0 22px;
}

/* AI message: full width */
.msg.ai {
  width: 100%;
  margin: 20px 0;
}

.msg.ai .bubble {
  width: 100%;
  padding: 16px 6px;
  font-size: 17px;
  line-height: 1.6;
  opacity: 0.95;
}

/* ===================== INPUT BAR ===================== */
#inputBar {
  height: 68px;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid #222;
  background: #000;
}

#messageInput {
  flex: 1;
  height: 45px;
  border-radius: 12px;
  background: #1a1a1a;
  border: none;
  padding: 0 14px;
  color: #fff;
  font-size: 15px;
}

.small-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  font-size: 19px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a1a1a;
  color: #fff;
  cursor: pointer;
}

.small-btn:hover {
  background: #222;
}
</style>
</head>

<body>

<!-- ============ SIDEBAR ============ -->
<div id="sidebar">
  <div class="sidebar-title">Echo AI</div>
  
  <input id="searchBox" placeholder="Search chats…">

  <div class="section-label">Projects</div>
  <div class="sidebar-item" onclick="newChat()">➕ New project</div>

  <div class="section-label">Recents</div>
  <div id="chatList"></div>

  <div id="newChatBtn" onclick="newChat()">✏️ Chat</div>
</div>

<!-- ============ MAIN ============ -->
<div id="main">
  <div id="topbar">
    <div class="top-btn" onclick="toggleSidebar()">☰</div>
    <div class="top-btn" onclick="refreshPage()">⟳</div>
  </div>

  <div id="chatArea"></div>

  <div id="inputBar">
    <button class="small-btn" onclick="newChat()">+</button>
    <input id="messageInput" placeholder="Ask anything…">
    <button class="small-btn" onclick="startVoice()">🎤</button>
    <button class="small-btn" onclick="send()">📨</button>
  </div>
</div>

<script>
/* ===================== DATA ===================== */
let chats = JSON.parse(localStorage.getItem("echo_chats") || "{}");
let currentChatId = localStorage.getItem("echo_currentChat") || null;

/* ===================== UI HELPERS ===================== */
function save() {
  localStorage.setItem("echo_chats", JSON.stringify(chats));
  localStorage.setItem("echo_currentChat", currentChatId);
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hidden");
}

function refreshPage() {
  location.reload();
}

/* ===================== CHAT HANDLING ===================== */
function newChat() {
  const id = "chat_" + Date.now();

  chats[id] = {
    title: "New chat",
    messages: []
  };

  currentChatId = id;
  save();
  loadChatList();
  loadChat();
}

function loadChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  const search = document.getElementById("searchBox").value.toLowerCase();

  for (const id of Object.keys(chats).reverse()) {
    const title = chats[id].title || "Untitled";

    if (!title.toLowerCase().includes(search)) continue;

    const div = document.createElement("div");
    div.className = "sidebar-item";
    div.innerText = title;
    div.onclick = () => {
      currentChatId = id;
      save();
      loadChat();
    };
    list.appendChild(div);
  }
}

document.getElementById("searchBox").oninput = loadChatList;

function loadChat() {
  const area = document.getElementById("chatArea");
  area.innerHTML = "";

  if (!currentChatId || !chats[currentChatId]) return;

  chats[currentChatId].messages.forEach(msg => {
    addMsg(msg.role, msg.content, false);
  });

  setTimeout(() => {
    area.scrollTop = area.scrollHeight;
  }, 50);
}

/* ===================== MESSAGE RENDERING ===================== */
function addMsg(role, text, push = true) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text;

  wrap.appendChild(bubble);
  document.getElementById("chatArea").appendChild(wrap);

  if (push) {
    chats[currentChatId].messages.push({ role, content: text });
    save();
  }

  document.getElementById("chatArea").scrollTop =
    document.getElementById("chatArea").scrollHeight;
}

/* ===================== AUTO NAME CHAT THREAD ===================== */
function autoNameChat(firstMsg) {
  let title = firstMsg.trim();

  if (title.length > 30) title = title.slice(0, 30) + "…";

  chats[currentChatId].title = title;
  save();
  loadChatList();
}

/* ===================== SEND MESSAGE ===================== */
async function send() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  if (!currentChatId) newChat();

  const isFirst = chats[currentChatId].messages.length === 0;

  input.value = "";
  addMsg("user", text);

  if (isFirst) autoNameChat(text);

  addMsg("ai", "Thinking…");

  const res = await fetch("https://jav-ai.netlify.app/.netlify/functions/chat", {
    method: "POST",
    body: JSON.stringify({
      messages: chats[currentChatId].messages
    })
  });

  const data = await res.json();

  document.querySelectorAll(".msg.ai .bubble").forEach(b => {
    if (b.innerText === "Thinking…") b.parentElement.remove();
  });

  addMsg("ai", data.reply);
}

/* ===================== ENTER TO SEND ===================== */
document.getElementById("messageInput").addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

/* ===================== VOICE ===================== */
function startVoice() {
  if (!("webkitSpeechRecognition" in window)) {
    alert("Voice not supported");
    return;
  }

  const r = new webkitSpeechRecognition();
  r.lang = "en-US";
  r.onresult = e => {
    document.getElementById("messageInput").value =
      e.results[0][0].transcript;
    send();
  };
  r.start();
}

/* ===================== INIT ===================== */
loadChatList();
if (!currentChatId) newChat();
loadChat();

</script>

</body>
</html>
