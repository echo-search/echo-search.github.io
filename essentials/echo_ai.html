<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Echo AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --bg4:#222222;
  --bg5:#2a2a2a;
  --border:#2a2a2a;
  --border2:#333;
  --text:#e8e8e8;
  --text2:#888;
  --text3:#555;
  --accent:#fff;
  --blue:#4a9eff;
  --green:#3ecf8e;
  --sidebar:268px;
  --radius:14px
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden;font-size:13px;line-height:1.6}

/* highlight.js custom tweaks */
.hljs {
  background: var(--bg2) !important;
  border-radius: 10px;
}
.ai-body pre code.hljs {
  padding: 0;
  background: transparent;
}

/* SCROLLBARS */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform 0.22s cubic-bezier(.4,0,.2,1)
}
#sidebar-top{padding:14px 12px 10px;display:flex;align-items:center;justify-content:space-between}
#sidebar-brand{font-family:'Instrument Serif',serif;font-size:17px;color:var(--text);letter-spacing:-0.02em;padding-left:4px}

.icon-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:6px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  transition:background 0.12s,color 0.12s
}
.icon-btn:hover{background:var(--bg3);color:var(--text2)}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

#search-wrap{margin:0 10px 6px;position:relative}
#search-wrap input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:7px 10px 7px 32px;color:var(--text);
  font-size:12px;font-family:inherit;outline:none;transition:border-color 0.15s
}
#search-wrap input:focus{border-color:var(--border2)}
#search-wrap input::placeholder{color:var(--text3)}
#search-wrap .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
#search-wrap .s-icon svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}

#search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  max-height:260px;overflow-y:auto;z-index:60;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.5)
}
#search-results.show{display:block}
.sr-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);transition:background 0.1s}
.sr-item:hover{background:var(--bg3);color:var(--text)}
.sr-item:last-child{border-bottom:none}
.sr-item b{color:var(--text)}

#new-chat-btn{
  margin:4px 10px 8px;display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;background:var(--bg4);
  border:1px solid var(--border);color:var(--text2);cursor:pointer;
  font-size:12px;font-family:inherit;width:calc(100% - 20px);
  transition:background 0.12s,color 0.12s,border-color 0.12s
}
#new-chat-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
#new-chat-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}

#sidebar-scroll{flex:1;overflow-y:auto;padding:2px 8px 12px}

.section-label{
  font-size:10px;font-weight:500;color:var(--text3);
  padding:10px 6px 4px;letter-spacing:0.08em;text-transform:uppercase
}

.sidebar-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;
  border-radius:9px;cursor:pointer;color:var(--text3);font-size:12px;
  transition:background 0.1s,color 0.1s;position:relative
}
.sidebar-item:hover{background:var(--bg3);color:var(--text2)}
.sidebar-item.active{background:var(--bg4);color:var(--text)}
.sidebar-item svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0;opacity:0.6}
.sidebar-item.active svg{opacity:1}
.sidebar-item span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-actions{display:none;gap:2px}
.sidebar-item:hover .item-actions{display:flex}
.item-actions button{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:2px 3px;border-radius:5px;display:flex;align-items:center;
  transition:color 0.1s,background 0.1s
}
.item-actions button:hover{color:var(--text2);background:var(--bg5)}
.item-actions button svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--bg)}

/* TOPBAR */
#topbar{
  padding:12px 20px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid transparent;position:relative;z-index:5
}
#model-pill{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:6px;
  cursor:pointer;transition:background 0.12s,border-color 0.12s;
  font-size:12px;font-family:inherit;color:var(--text2)
}
#model-pill:hover{background:var(--bg4);border-color:var(--border2);color:var(--text)}
#model-pill svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;transition:transform 0.15s}
#model-name{font-size:12px}

#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.temp-badge{
  font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;
  background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px
}
.temp-badge svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}

/* SPEED CONTROL */
#speed-ctrl{
  display:flex;align-items:center;gap:2px;
  background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;
}
.speed-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:3px 8px;border-radius:16px;font-size:11px;font-family:inherit;
  transition:background 0.12s,color 0.12s
}
.speed-btn.active{background:var(--bg5);color:var(--text)}
.speed-btn:hover:not(.active){color:var(--text2)}

/* CHAT AREA */
#chat{flex:1;overflow-y:auto;padding:0;scroll-behavior:smooth}

#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--text3);animation:fadeUp 0.4s ease
}
#empty-state .logo{
  font-family:'Instrument Serif',serif;font-size:36px;color:var(--text2);
  letter-spacing:-0.03em;margin-bottom:4px
}
#empty-state p{font-size:13px;color:var(--text3);text-align:center;max-width:280px;line-height:1.7}
#empty-state .suggestions{display:flex;flex-direction:column;gap:6px;margin-top:8px;width:100%;max-width:320px}
.suggestion-pill{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;cursor:pointer;color:var(--text2);font-size:12px;font-family:inherit;
  text-align:left;transition:background 0.12s,color 0.12s,border-color 0.12s;line-height:1.5
}
.suggestion-pill:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* MESSAGES */
.msg-wrap{padding:28px 0 0;animation:fadeIn 0.22s ease}
.msg-wrap:last-child{padding-bottom:24px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.msg-inner{max-width:740px;margin:0 auto;padding:0 28px}

.user-row{display:flex;justify-content:flex-end}
.user-bubble{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:16px 16px 4px 16px;padding:10px 16px;max-width:72%;
  color:var(--text);line-height:1.65;white-space:pre-wrap;font-size:13px
}

.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-avatar{
  width:24px;height:24px;border-radius:6px;background:var(--bg4);
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.ai-avatar svg{width:13px;height:13px;fill:none;stroke:var(--text3);stroke-width:1.8}
.ai-label{font-size:11px;color:var(--text3);letter-spacing:0.04em}

.ai-body{color:var(--text);line-height:1.8;font-size:13px;word-break:break-word}
.ai-body p{margin-bottom:10px}
.ai-body p:last-child{margin-bottom:0}
.ai-body pre{
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  padding:14px;overflow-x:auto;margin:12px 0;position:relative
}
.ai-body pre code{font-family:'Geist Mono',ui-monospace,monospace;font-size:12px;color:#c9d1d9}
.ai-body :not(pre) > code{
  background:var(--bg4);border:1px solid var(--border2);border-radius:5px;
  padding:1px 6px;font-size:12px;color:var(--green)
}
.ai-body strong{font-weight:600;color:var(--accent)}
.ai-body em{font-style:italic;color:var(--text2)}
.ai-body h1,.ai-body h2,.ai-body h3{font-family:'Instrument Serif',serif;font-weight:400;color:var(--text)}
.ai-body h1{font-size:22px;margin:16px 0 8px}
.ai-body h2{font-size:18px;margin:14px 0 6px}
.ai-body h3{font-size:15px;margin:12px 0 5px}
.ai-body ul,.ai-body ol{margin:8px 0 8px 18px}
.ai-body li{margin:4px 0}
.ai-body blockquote{
  border-left:3px solid var(--border2);padding-left:14px;
  color:var(--text2);margin:10px 0;font-style:italic
}

/* CURSOR */
.cursor{
  display:inline-block;width:2px;height:1em;background:var(--text2);
  vertical-align:text-bottom;margin-left:1px;border-radius:1px;
  animation:blink 0.85s steps(1) infinite
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* MSG ACTIONS */
.msg-actions{
  display:flex;gap:4px;margin-top:10px;
  opacity:0;transition:opacity 0.15s;margin-left:32px
}
.msg-wrap:hover .msg-actions{opacity:1}
.msg-actions button{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:4px 8px;border-radius:7px;font-size:11px;font-family:inherit;
  display:flex;align-items:center;gap:4px;transition:background 0.1s,color 0.1s
}
.msg-actions button:hover{background:var(--bg3);color:var(--text2)}
.msg-actions button svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}

/* STREAMING CONTROLS */
#stream-controls{
  display:none;align-items:center;gap:8px;
  max-width:740px;margin:0 auto;padding:8px 28px 0
}
#stream-controls.visible{display:flex}
#stop-btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:5px 12px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:background 0.12s,color 0.12s
}
#stop-btn:hover{background:var(--bg4);color:var(--text)}
#stop-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
#skip-btn{
  background:none;border:none;color:var(--text3);
  padding:5px 10px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;
  transition:color 0.12s
}
#skip-btn:hover{color:var(--text2)}

/* INPUT */
#input-area{padding:10px 28px 20px;max-width:740px;margin:0 auto;width:100%}
#input-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;transition:border-color 0.15s
}
#input-box:focus-within{border-color:var(--border2)}
#input-row{display:flex;align-items:flex-end;gap:8px;padding:10px 12px 8px}
#input{
  flex:1;background:none;border:none;color:var(--text);font-size:13px;
  resize:none;outline:none;max-height:200px;min-height:22px;line-height:1.6;
  font-family:inherit
}
#input::placeholder{color:var(--text3)}
#input-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px 8px;border-top:1px solid var(--border)}
.tool-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:4px 8px;border-radius:7px;display:flex;align-items:center;gap:4px;
  font-size:11px;font-family:inherit;transition:background 0.1s,color 0.1s
}
.tool-btn:hover{background:var(--bg3);color:var(--text2)}
.tool-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8}
.toolbar-spacer{flex:1}
#send-btn{
  background:var(--text);border:none;color:#000;
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s,transform 0.12s;flex-shrink:0
}
#send-btn:not(:disabled):hover{transform:scale(1.06)}
#send-btn:disabled{opacity:0.25;cursor:default}
#send-btn svg{width:13px;height:13px;fill:currentColor}
#voice-btn{
  background:none;border:1px solid var(--border);color:var(--text3);
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,color 0.15s
}
#voice-btn:hover{background:var(--bg3);color:var(--text2)}
#voice-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
#voice-btn.active{background:#c0392b;border-color:#c0392b;color:#fff}
.input-hint{text-align:center;margin-top:8px;font-size:10px;color:var(--text3)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(6px)
}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  padding:24px;min-width:320px;max-width:440px;width:90%;
  animation:modalIn 0.18s cubic-bezier(.4,0,.2,1)
}
@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:14px;font-weight:500;margin-bottom:16px;color:var(--text);font-family:'Instrument Serif',serif;letter-spacing:-0.01em;font-size:18px}
.modal input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;
  font-family:inherit;outline:none;margin-bottom:14px;transition:border-color 0.15s
}
.modal input:focus{border-color:var(--border2)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:opacity 0.1s}
.btn-primary{background:var(--text);color:#000;font-weight:500}
.btn-primary:hover{opacity:0.85}
.btn-cancel{background:var(--bg4);color:var(--text2)}
.btn-cancel:hover{background:var(--bg5)}

/* CONTEXT MENU */
.ctx-menu{
  position:fixed;background:var(--bg2);border:1px solid var(--border2);
  border-radius:12px;padding:5px;min-width:160px;z-index:200;
  box-shadow:0 12px 32px rgba(0,0,0,0.6);
  animation:ctxIn 0.12s ease
}
@keyframes ctxIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{
  padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;
  color:var(--text2);display:flex;align-items:center;gap:8px;
  transition:background 0.1s,color 0.1s;font-family:inherit
}
.ctx-item:hover{background:var(--bg3);color:var(--text)}
.ctx-item.danger:hover{background:#2d1212;color:#ff6b6b}
.ctx-item svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.ctx-divider{height:1px;background:var(--border);margin:4px 0}

/* TOAST */
.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:8px 16px;border-radius:20px;font-size:12px;
  z-index:500;white-space:nowrap;pointer-events:none;
  animation:toastIn 0.2s ease, toastOut 0.2s ease 2s forwards
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* Mobile */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10}
@media(max-width:680px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:20;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
  .msg-inner{padding:0 16px}
  #input-area{padding:10px 12px 20px}
  #stream-controls{padding:8px 16px 0}
}
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-top">
    <span id="sidebar-brand">Echo AI</span>
    <div style="display:flex;gap:2px">
      <button class="icon-btn" onclick="openNewChatModal()" title="New chat (⌘N)">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" onclick="closeSidebar()" title="Close">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div id="search-wrap" style="position:relative">
    <span class="s-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input type="text" id="sidebar-search" placeholder="Search chats…" oninput="handleSearch(this.value)" onfocus="showSearchResults()"/>
    <div id="search-results"></div>
  </div>

  <button id="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    New conversation
  </button>

  <div id="sidebar-scroll">
    <div>
      <div class="section-label">Projects</div>
      <div id="projects-list"></div>
      <div class="sidebar-item" onclick="openNewProjectModal()" style="color:var(--text3)">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><path d="M12 11v6M9 14h6"/></svg>
        <span>New project</span>
      </div>
    </div>
    <div>
      <div class="section-label">Recent</div>
      <div id="chats-list"></div>
    </div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <button class="icon-btn" onclick="toggleSidebar()" id="menu-btn" style="display:none">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div id="model-pill" onclick="cycleModel()">
      <span id="model-name">Echo AI</span>
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div id="topbar-right">
      <div id="speed-ctrl">
        <button class="speed-btn" onclick="setSpeed('slow')">slow</button>
        <button class="speed-btn active" onclick="setSpeed('normal')">normal</button>
        <button class="speed-btn" onclick="setSpeed('fast')">fast</button>
      </div>
      <div id="temp-badge" class="temp-badge" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Temporary
      </div>
      <button class="icon-btn" onclick="toggleTempChat()" title="Temporary chat" id="temp-btn">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </button>
    </div>
  </div>

  <div id="chat">
    <div id="empty-state">
      <div class="logo">Echo AI</div>
      <p>Your thoughts, amplified.</p>
      <div class="suggestions">
        <button class="suggestion-pill" onclick="fillInput('Explain quantum entanglement simply')">Explain quantum entanglement simply →</button>
        <button class="suggestion-pill" onclick="fillInput('Write a haiku about debugging code')">Write a haiku about debugging code →</button>
        <button class="suggestion-pill" onclick="fillInput('What are the best practices for REST API design?')">Best practices for REST API design →</button>
      </div>
    </div>
  </div>

  <div id="stream-controls">
    <button id="stop-btn" onclick="stopStreaming()">
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      Stop

<script>
// ============================================================
// STATE
// ============================================================
let state = {
  chats: [],
  projects: [],

  isTemp: false,
  models: ['Echo AI', 'Echo AI Pro', 'Echo AI Fast'],
  modelIdx: 0,
  renameTarget: null,
  renameType: null
};

const SPEEDS = { slow: 12, normal: 28, fast: 80 };
let currentSpeed = 'normal';

// ============================================================
// HIGHLIGHT.JS INTEGRATION
// ============================================================
function highlightCodeBlocks() {
  document.querySelectorAll('.ai-body pre code').forEach((block) => {
    if (typeof hljs !== 'undefined' && hljs.highlightElement) {
      hljs.highlightElement(block);
    }
  });

// ============================================================
// TYPING ENGINE
// ============================================================
class TypeWriter {
  constructor(container, fullText, onDone) {
    this.container = container;
    this.fullText = fullText;
    this.onDone = onDone;
    this.pos = 0;
    this.stopped = false;
    this.rafId = null;
    this.cursor = null;
    this.lastTime = null;
    this.charsBuffer = 0;
  }

  start() {
    this.cursor = document.createElement('span');
    this.cursor.className = 'cursor';
    this.container.appendChild(this.cursor);
    this._scheduleFrame();
  }

  _scheduleFrame() {
    this.rafId = requestAnimationFrame(ts => this._frame(ts));
  }

  _frame(ts) {
    if (this.stopped) return;
    if (!this.lastTime) this.lastTime = ts;
    const delta = ts - this.lastTime;
    this.lastTime = ts;
    const charsPerMs = SPEEDS[currentSpeed] / 16;
    this.charsBuffer += charsPerMs * delta;
    const toAdd = Math.floor(this.charsBuffer);
    this.charsBuffer -= toAdd;
    if (toAdd > 0) {
      this.pos = Math.min(this.pos + toAdd, this.fullText.length);
      this._render();
    }
    const chat = document.getElementById('chat');
    if (chat) chat.scrollTop = chat.scrollHeight;
    if (this.pos < this.fullText.length) {
      this._scheduleFrame();
    } else {
      this._finish();
    }
  }

  _render() {
    const partial = this.fullText.slice(0, this.pos);
    this.container.innerHTML = formatAI(partial);
    this.cursor = document.createElement('span');
    this.cursor.className = 'cursor';
    this.container.appendChild(this.cursor);
  }

  stop() {
    this.stopped = true;
    if (this.rafId) cancelAnimationFrame(this.rafId);
    this._finish();
  }

  skip() {
    this.stopped = true;
    if (this.rafId) cancelAnimationFrame(this.rafId);
    this.pos = this.fullText.length;
    this._render();
    this._finish();
  }

  _finish() {
    if (this.cursor && this.cursor.parentNode) this.cursor.remove();
    this.container.innerHTML = formatAI(this.fullText);
    highlightCodeBlocks();
    if (this.onDone) this.onDone();
  }
}

let activeWriter = null;

function stopStreaming() {
  if (activeWriter) { activeWriter.stop(); activeWriter = null; }
  hideStreamControls();
}

function skipToEnd() {
  if (activeWriter) { activeWriter.skip(); activeWriter = null; }
  hideStreamControls();
}

function showStreamControls() {
  document.getElementById('stream-controls').classList.add('visible');
}

function hideStreamControls() {
  document.getElementById('stream-controls').classList.remove('visible');
}

function setSpeed(s) {
  currentSpeed = s;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === s);
  });
}

// ============================================================
// PERSISTENCE
// ============================================================
function save() {
  try {
    localStorage.setItem('echo_ai_v2', JSON.stringify({ chats: state.chats, projects: state.projects }));
  } catch(e) {}
}

function load() {
  try {
    const s = JSON.parse(localStorage.getItem('echo_ai_v2') || '{}');
    if (s.chats) state.chats = s.chats;
    if (s.projects) state.projects = s.projects;
  } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ============================================================
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');

  ov.classList.toggle('show');

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// CHAT MANAGEMENT
// ============================================================
function newChat() {
  if (state.isTemp) { clearTempMessages(); return; }
  const chat = { id: uid(), name: 'New conversation', messages: [], createdAt: Date.now(), projectId: null };
  state.chats.unshift(chat);
  state.activeChatId = chat.id;
  save();
  renderSidebar();
  renderChat();
}

function openNewChatModal() {
  document.getElementById('new-chat-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('chat-name-input').focus(), 80);

function createNamedChat() {
  const name = document.getElementById('chat-name-input').value.trim() || 'New conversation';
  document.getElementById('chat-name-input').value = '';
  closeModals();
  const chat = { id: uid(), name, messages: [], createdAt: Date.now(), projectId: null };
  state.chats.unshift(chat);
  state.activeChatId = chat.id;
  save();
  renderSidebar();
  renderChat();
}

function loadChat(id) {
  state.activeChatId = id;
  state.isTemp = false;
  document.getElementById('temp-badge').style.display = 'none';
  document.getElementById('temp-btn').style.color = '';
  renderSidebar();
  renderChat();
  if (window.innerWidth <= 680) closeSidebar();
}

function getActiveChat() { return state.chats.find(c => c.id === state.activeChatId) || null; }

// ============================================================
// PROJECTS
// ============================================================
function openNewProjectModal() {
  document.getElementById('new-project-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('project-name-input').focus(), 80);
}

function createProject() {
  const name = document.getElementById('project-name-input').value.trim() || 'New project';

  state.projects.push({ id: uid(), name, createdAt: Date.now() });

// ============================================================
// TEMP CHAT
// ============================================================
let tempMessages = [];

function toggleTempChat() {
  state.isTemp = !state.isTemp;
  state.activeChatId = null;
  const badge = document.getElementById('temp-badge');
  const btn = document.getElementById('temp-btn');
  if (state.isTemp) {
    badge.style.display = 'flex';

    renderChat();
    showToast("Temporary — messages won't be saved");
  } else {
    badge.style.display = 'none';
    btn.style.color = '';
    clearTempMessages();
  }
  renderSidebar();

function clearTempMessages() {
  tempMessages = [];
  renderChat();
}

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderSidebar() {
  const pl = document.getElementById('projects-list');
  if (pl) {
    pl.innerHTML = '';
    state.projects.forEach(p => {
      const el = document.createElement('div');
      el.className = 'sidebar-item';
      el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>${esc(p.name)}</span><div class="item-actions"><button onclick="event.stopPropagation();showCtxMenu(event,'project','${p.id}')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button></div>`;
      pl.appendChild(el);
    });
  }

  const cl = document.getElementById('chats-list');
  if (cl) {
    cl.innerHTML = '';
    state.chats.forEach(c => {
      const el = document.createElement('div');
      el.className = 'sidebar-item' + (state.activeChatId === c.id ? ' active' : '');
      el.onclick = () => loadChat(c.id);
      el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>${esc(c.name)}</span><div class="item-actions"><button onclick="event.stopPropagation();showCtxMenu(event,'chat','${c.id}')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button></div>`;
      cl.appendChild(el);
    });
  }
}

// ============================================================
// RENDER CHAT
// ============================================================
function renderChat() {
  const chat = document.getElementById('chat');
  if (!chat) return;
  chat.innerHTML = '';
  const messages = state.isTemp ? tempMessages : (getActiveChat() ? getActiveChat().messages : []);

  if (!messages || messages.length === 0) {
    const es = document.createElement('div');
    es.id = 'empty-state';
    es.innerHTML = `
      <div class="logo">Echo AI</div>
      <p>Your thoughts, amplified.</p>
      <div class="suggestions">
        <button class="suggestion-pill" onclick="fillInput('Explain quantum entanglement simply')">Explain quantum entanglement simply →</button>
        <button class="suggestion-pill" onclick="fillInput('Write a haiku about debugging code')">Write a haiku about debugging code →</button>
        <button class="suggestion-pill" onclick="fillInput('What are the best practices for REST API design?')">Best practices for REST API design →</button>
      </div>`;
    chat.appendChild(es);
    return;
  }

  messages.forEach(m => appendMsgEl(m.role, m.content, false, false));
}

function appendMsgEl(role, text, scroll, stream) {
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  const chat = document.getElementById('chat');
  if (!chat) return;

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const inner = document.createElement('div');
  inner.className = 'msg-inner';

  if (role === 'user') {
    const row = document.createElement('div');
    row.className = 'user-row';
    const bubble = document.createElement('div');
    bubble.className = 'user-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    inner.appendChild(row);
    wrap.appendChild(inner);
    chat.appendChild(wrap);
    if (scroll) chat.scrollTop = chat.scrollHeight;
    return;
  }

  const header = document.createElement('div');
  header.className = 'ai-header';
  header.innerHTML = `<div class="ai-avatar"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span class="ai-label">ECHO AI</span>`;

  const body = document.createElement('div');
  body.className = 'ai-body';

  inner.appendChild(header);
  inner.appendChild(body);
  wrap.appendChild(inner);
  chat.appendChild(wrap);
  if (scroll) chat.scrollTop = chat.scrollHeight;

  if (stream) {
    showStreamControls();
    const writer = new TypeWriter(body, text, () => {
      activeWriter = null;
      hideStreamControls();
      inner.appendChild(buildMsgActions(text));
      highlightCodeBlocks();
      chat.scrollTop = chat.scrollHeight;
    });
    activeWriter = writer;
    writer.start();
  } else {
    body.innerHTML = formatAI(text);
    highlightCodeBlocks();
    inner.appendChild(buildMsgActions(text));
    if (scroll) chat.scrollTop = chat.scrollHeight;
  }
}

function buildMsgActions(text) {
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = `
    <button onclick="copyMsgText(this)" data-text="${esc(text).replace(/"/g,'&quot;')}">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy
    </button>
    <button onclick="regenerate()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.4"/></svg>Retry
    </button>`;
  return actions;
}

// ============================================================
// FORMAT AI TEXT
// ============================================================
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatAI(text) {
  let h = String(text);
  
  // First, protect code blocks from other formatting
  const codeBlocks = [];
  h = h.replace(/```([\w]*)\n?([\s\S]*?)```/g, (match, lang, code) => {
    const idx = codeBlocks.length;
    const language = lang || 'plaintext';
    // Store the code block with its original whitespace preserved
    codeBlocks.push(`<pre><code class="language-${language}">${escapeHtml(code)}</code></pre>`);
    return `__CODE_BLOCK_${idx}__`;
  });
  
  // Apply other markdown formatting (but NOT to code blocks)
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  
  // Handle paragraphs (but avoid breaking inside code blocks)
  const parts = h.split(/\n\n+/);
  let result = parts.map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<')) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).filter(Boolean).join('');
  
  // Restore code blocks
  result = result.replace(/__CODE_BLOCK_(\d+)__/g, (_, idx) => codeBlocks[parseInt(idx)]);
  
  return result;
}

// ============================================================
// SEND
// ============================================================
async function send() {
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const text = inputEl ? inputEl.value.trim() : '';
  if (!text) return;

  if (activeWriter) { activeWriter.stop(); activeWriter = null; hideStreamControls(); }

  if (inputEl) { inputEl.value = ''; inputEl.style.height = 'auto'; }
  if (sendBtn) sendBtn.disabled = true;

  const systemMessages = [
    { role: "system", content: "You are Echo AI, a helpful, concise, and knowledgeable assistant. Be conversational but precise." }
  ];

  if (!state.isTemp && !state.activeChatId) {
    const title = await genTitle(text);
    const chat = { id: uid(), name: title, messages: [], createdAt: Date.now(), projectId: null };
    state.chats.unshift(chat);
    state.activeChatId = chat.id;
    save();
    renderSidebar();
  }

  const msgs = state.isTemp ? tempMessages : getActiveChat().messages;
  msgs.push({ role: 'user', content: text });

  if (!state.isTemp && getActiveChat() && getActiveChat().messages.length === 1) {
    genTitle(text).then(title => {
      if (getActiveChat()) getActiveChat().name = title;
      save();
      renderSidebar();
    });
  }

  if (!state.isTemp) save();
  renderSidebar();
  appendMsgEl('user', text, true, false);

  const thinkWrap = document.createElement('div');
  thinkWrap.className = 'msg-wrap';
  thinkWrap.id = 'think-row';
  thinkWrap.innerHTML = `<div class="msg-inner"><div class="ai-header"><div class="ai-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span class="ai-label" style="color:var(--text3)">thinking<span class="cursor" style="animation-duration:0.6s"></span></span></div></div>`;
  const chatEl = document.getElementById('chat');
  if (chatEl) { chatEl.appendChild(thinkWrap); chatEl.scrollTop = chatEl.scrollHeight; }

  try {
    const res = await fetch("https://jav-ai.netlify.app/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: [...systemMessages, ...msgs] })
    });

    if (!res.ok) throw new Error(`API error: ${res.status} ${res.statusText}`);

    let data;
    try { data = await res.json(); } catch(e) { throw new Error("Invalid JSON from API."); }

    document.getElementById('think-row')?.remove();

    let reply = '';
    if (typeof data?.reply === 'string' && data.reply.trim()) {
      reply = data.reply.trim();
    } else if (Array.isArray(data?.content) && data.content.length > 0) {
      reply = data.content
        .filter(b => b?.type === 'text' && typeof b?.text === 'string')
        .map(b => b.text)
        .join('')
        .trim();
    }

    if (!reply) reply = "No response from AI.";

    msgs.push({ role: 'assistant', content: reply });
    if (!state.isTemp) save();
    appendMsgEl('assistant', reply, true, true);

  } catch(e) {
    document.getElementById('think-row')?.remove();
    const errMsg = (e.message?.startsWith('API error') || e.message?.startsWith('Invalid JSON'))
      ? `Error: ${e.message}`
      : "Connection error. Please check your network and try again.";
    msgs.push({ role: 'assistant', content: errMsg });
    if (!state.isTemp) save();
    appendMsgEl('assistant', errMsg, true, false);
  } finally {
    if (sendBtn) sendBtn.disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const btn = document.getElementById('send-btn');
    if (btn && !btn.disabled) send();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  const btn = document.getElementById('send-btn');
  if (btn) btn.disabled = !el.value.trim();
}

const inputElListener = document.getElementById('input');
if (inputElListener) {
  inputElListener.addEventListener('input', function() {
    const btn = document.getElementById('send-btn');
    if (btn) btn.disabled = !this.value.trim();
  });
}

function fillInput(text) {
  const input = document.getElementById('input');
  if (!input) return;
  input.value = text;
  autoResize(input);
  input.focus();
}

// ============================================================
// VOICE INPUT
// ============================================================
function startVoice() {
  const btn = document.getElementById('voice-btn');
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'en-US';
  rec.onstart = () => { if (btn) btn.classList.add('active'); };
  rec.onend = () => { if (btn) btn.classList.remove('active'); };
  rec.onresult = e => {
    const inp = document.getElementById('input');
    if (inp) { inp.value = e.results[0][0].transcript; autoResize(inp); }
  };
  rec.onerror = () => { if (btn) btn.classList.remove('active'); };
  rec.start();
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch(q) {
  const res = document.getElementById('search-results');
  if (!res) return;
  if (!q.trim()) { res.classList.remove('show'); return; }
  const matches = state.chats.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    c.messages.some(m => m.content.toLowerCase().includes(q.toLowerCase()))
  );
  if (!matches.length) {
    res.innerHTML = '<div class="sr-item" style="color:var(--text3)">No results found</div>';
  } else {
    res.innerHTML = matches.slice(0, 8).map(c =>
      `<div class="sr-item" onclick="loadChat('${c.id}');document.getElementById('sidebar-search').value='';document.getElementById('search-results').classList.remove('show')"><b>${esc(c.name)}</b></div>`
    ).join('');
  }
  res.classList.add('show');
}

function showSearchResults() {
  const q = document.getElementById('sidebar-search')?.value || '';
  if (q.trim()) handleSearch(q);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) {
    document.getElementById('search-results')?.classList.remove('show');
  }
  if (!e.target.closest('#ctx-menu')) {
    const m = document.getElementById('ctx-menu');
    if (m) m.style.display = 'none';
  }
});

// ============================================================
// CONTEXT MENU
// ============================================================
function showCtxMenu(e, type, id) {
  e.stopPropagation();
  const menu = document.getElementById('ctx-menu');
  if (!menu) return;
  const chatItems = [
    { icon: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>', label: 'Rename', action: `openRename('chat','${id}')` },
    { icon: '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>', label: 'Move to project', action: `moveToProject('${id}')` },
    'divider',
    { icon: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>', label: 'Delete', action: `deleteChat('${id}')`, danger: true }
  ];
  const projItems = [
    { icon: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>', label: 'Rename', action: `openRename('project','${id}')` },
    'divider',
    { icon: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>', label: 'Delete', action: `deleteProject('${id}')`, danger: true }
  ];
  const items = type === 'chat' ? chatItems : projItems;
  menu.innerHTML = items.map(item =>
    item === 'divider' ? '<div class="ctx-divider"></div>' :
    `<div class="ctx-item${item.danger ? ' danger' : ''}" onclick="${item.action}"><svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2">${item.icon}</svg>${item.label}</div>`
  ).join('');
  const btnRect = e.target.closest('button').getBoundingClientRect();
  menu.style.display = 'block';
  menu.style.top = btnRect.bottom + 4 + 'px';
  menu.style.left = Math.min(btnRect.left, window.innerWidth - 180) + 'px';
}

function openRename(type, id) {
  const menu = document.getElementById('ctx-menu');
  if (menu) menu.style.display = 'none';
  state.renameTarget = id;
  state.renameType = type;
  const item = type === 'chat' ? state.chats.find(c => c.id === id) : state.projects.find(p => p.id === id);
  const titleEl = document.getElementById('rename-title');
  const inputEl = document.getElementById('rename-input');
  const modal = document.getElementById('rename-modal');
  if (titleEl) titleEl.textContent = type === 'chat' ? 'Rename conversation' : 'Rename project';
  if (inputEl) inputEl.value = item ? item.name : '';
  if (modal) modal.style.display = 'flex';
  setTimeout(() => document.getElementById('rename-input')?.select(), 80);
}

function confirmRename() {
  const name = document.getElementById('rename-input')?.value.trim();
  if (!name) { closeModals(); return; }
  if (state.renameType === 'chat') {
    const c = state.chats.find(x => x.id === state.renameTarget);
    if (c) c.name = name;
  } else {
    const p = state.projects.find(x => x.id === state.renameTarget);
    if (p) p.name = name;
  }
  save();
  closeModals();
  renderSidebar();
}

function deleteChat(id) {
  const menu = document.getElementById('ctx-menu');
  if (menu) menu.style.display = 'none';
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) { state.activeChatId = null; renderChat(); }
  save();
  renderSidebar();
}

function deleteProject(id) {
  const menu = document.getElementById('ctx-menu');
  if (menu) menu.style.display = 'none';
  state.projects = state.projects.filter(p => p.id !== id);
  save();
  renderSidebar();
}

function moveToProject(chatId) {
  const menu = document.getElementById('ctx-menu');
  if (menu) menu.style.display = 'none';
  if (!state.projects.length) { showToast('Create a project first'); return; }
  const p = state.projects[0];
  const c = state.chats.find(x => x.id === chatId);
  if (c) { c.projectId = p.id; save(); renderSidebar(); showToast(`Moved to "${p.name}"`); }
}

// ============================================================
// REGENERATE
// ============================================================
function regenerate() {
  const msgs = state.isTemp ? tempMessages : (getActiveChat() ? getActiveChat().messages : []);
  if (!msgs.length) return;
  if (msgs[msgs.length - 1]?.role === 'assistant') msgs.pop();
  const lastUser = [...msgs].reverse().find(m => m.role === 'user');
  if (!lastUser) return;
  const idx = msgs.lastIndexOf(lastUser);
  if (idx !== -1) msgs.splice(idx, 1);
  if (!state.isTemp) save();
  renderChat();
  const input = document.getElementById('input');
  if (input) { input.value = lastUser.content; }
  send();
}

// ============================================================
// UTILS
// ============================================================
function copyMsgText(btn) {
  const text = (btn.getAttribute('data-text') || '')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

function attachFile() { showToast('File attachment coming soon'); }

function insertCode() {
  const i = document.getElementById('input');
  if (!i) return;
  const pos = i.selectionStart;
  const val = i.value;
  i.value = val.slice(0, pos) + '```javascript\n\n```' + val.slice(pos);
  i.selectionStart = i.selectionEnd = pos + 12;
  i.focus();
  autoResize(i);
}

function cycleModel() {
  state.modelIdx = (state.modelIdx + 1) % state.models.length;
  document.getElementById('model-name').textContent = state.models[state.modelIdx];
  showToast('Switched to ' + state.models[state.modelIdx]);
}

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function closeModals(e) {
  if (e && e.target !== e.currentTarget) return;
  document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
}

// ============================================================
// MOBILE + KEYBOARD
// ============================================================
function checkMobile() {
  const isMobile = window.innerWidth <= 680;
  const btn = document.getElementById('menu-btn');
  if (btn) btn.style.display = isMobile ? 'flex' : 'none';
}
window.addEventListener('resize', checkMobile);
checkMobile();

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('sidebar-search')?.focus(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); newChat(); }
  if (e.key === 'Escape') {
    closeModals();
    const m = document.getElementById('ctx-menu');
    if (m) m.style.display = 'none';
  }
});

document.getElementById('rename-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') confirmRename(); });
document.getElementById('chat-name-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') createNamedChat(); });
document.getElementById('project-name-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') createProject(); });

// ============================================================
// INIT
// ============================================================
load();
if (!state.chats.length) {
  const welcome = {
    id: uid(),
    name: 'Welcome',
    messages: [{ role: 'assistant', content: "Hi! I'm **Echo AI**. Ask me anything — I'm here to help." }],
    createdAt: Date.now(),
    projectId: null
  };
  state.chats.push(welcome);
  state.activeChatId = welcome.id;
  save();
}
renderSidebar();
renderChat();
</script>
