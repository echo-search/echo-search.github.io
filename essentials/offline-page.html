<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline Mode</title>

<style>
html,body {
    margin:0; padding:0;
    background:#000;
    color:#00e5ff;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    overflow:hidden;
    user-select:none;
    touch-action:none;
}

/* Offline Screen */
#offlineScreen {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}
#playBtn {
    margin-top:20px;
    padding:12px 26px;
    background:#00e5ff;
    color:#000;
    border-radius:10px;
    font-size:20px;
    font-weight:bold;
}

/* Game Canvas */
#gameCanvas { display:none; }

/* Game Score */
#score {
    position:fixed;
    top:10px; left:10px;
    font-size:24px;
    font-weight:bold;
}

/* Pause */
#pauseBtn {
    position:fixed;
    top:10px; right:10px;
    padding:6px 16px;
    background:#00e5ff;
    color:#000;
    border-radius:6px;
    font-weight:bold;
}

/* Game Over Panel */
#gameOverPanel {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    padding:30px;
    background:rgba(0,0,0,0.85);
    border:2px solid #00e5ff;
    border-radius:12px;
    text-align:center;
    display:none;
}
#gameOverPanel button {
    margin:10px;
    background:#00e5ff;
    color:#000;
    padding:10px 20px;
    font-size:18px;
    border-radius:8px;
    font-weight:bold;
}

/* Wi-Fi Back Popup */
#wifiPopup {
    position:fixed;
    top:-80px; left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:500px;
    padding:16px;
    background:rgba(0,0,0,0.85);
    border:2px solid #00e5ff;
    color:#00e5ff;
    text-align:center;
    border-radius:10px;
    font-size:18px;
    transition:top .45s ease;
    z-index:999;
}

/* Touch Controls */
#touchControls {
    position:fixed;
    bottom:20px; left:20px;
    display:none;
}
.dpad {
    width:140px; height:140px;
    position:relative;
}
.dpad button {
    position:absolute;
    width:50px; height:50px;
    background:rgba(0,229,255,0.35);
    border:1px solid #00e5ff;
    border-radius:8px;
    color:#00e5ff;
    font-size:22px;
}
#up { top:0; left:45px; }
#down { bottom:0; left:45px; }
#left { top:45px; left:0; }
#right { top:45px; right:0; }

#fireBtn {
    position:fixed;
    bottom:30px; right:30px;
    width:100px; height:100px;
    border-radius:50%;
    background:rgba(0,229,255,0.35);
    border:2px solid #00e5ff;
    color:#00e5ff;
    font-size:24px;
    display:none;
}
</style>
</head>

<body>

<!-- WiFi Popup -->
<div id="wifiPopup">Wi-Fi is back! You can return to EchoSearch.</div>

<!-- Offline Screen -->
<div id="offlineScreen">
    <h2>No Wi-Fi detected.</h2>
    <p>Relax — you can still play a game while we reconnect.</p>
    <button id="playBtn">Play Game</button>
</div>

<!-- Game -->
<canvas id="gameCanvas"></canvas>
<div id="score">0</div>
<div id="pauseBtn" style="display:none;">II</div>

<div id="gameOverPanel">
    <h2>GAME OVER</h2>
    <div id="finalScore"></div>
    <div id="bestScore"></div>
    <button onclick="restartGame()">Replay</button>
</div>

<!-- Touch controls -->
<div id="touchControls">
    <div class="dpad">
        <button id="up">▲</button>
        <button id="down">▼</button>
        <button id="left">◀</button>
        <button id="right">▶</button>
    </div>
</div>
<button id="fireBtn">FIRE</button>

<script>
//////////////////////////////////////////////////
// PLAY GAME BUTTON → START GAME MODE
//////////////////////////////////////////////////
document.getElementById("playBtn").onclick = () => {
    document.getElementById("offlineScreen").style.display="none";
    startGame();
};

//////////////////////////////////////////////////
// WIFI BACK DETECTOR
//////////////////////////////////////////////////
let wifiBackAudio = new Audio("data:audio/mp3;base64, YOUR_BASE64_HERE");

function checkWifi() {
    fetch("https://echo-search.github.io/", { method:"HEAD", cache:"no-store" })
    .then(()=>{
        showWifiBack();
    })
    .catch(()=>{});
}

function showWifiBack() {
    let popup = document.getElementById("wifiPopup");
    popup.style.top = "20px";
    wifiBackAudio.play().catch(()=>{});
    setTimeout(()=> popup.style.top="-80px", 4000);
}

setInterval(checkWifi, 5000);

//////////////////////////////////////////////////
// GAME LOGIC
//////////////////////////////////////////////////

let canvas, ctx;
let ship, lasers, enemies, walls, stars;
let keys={}, score=0, best=0, speed=0.3;
let paused=false, gameOver=false;

function startGame() {
    canvas = document.getElementById("gameCanvas");
    ctx = canvas.getContext("2d");
    canvas.style.display="block";
    document.getElementById("pauseBtn").style.display="block";

    resize();
    window.onresize = resize;

    ship={x:0,y:0,z:0};
    lasers=[];
    enemies=[];
    walls=[];
    stars=[];
    score=0;
    speed=0.3;
    paused=false;
    gameOver=false;

    for(let i=0;i<200;i++) stars.push(spawnStar());

    loop();
}

function resize(){
    let c=document.getElementById("gameCanvas");
    c.width=window.innerWidth;
    c.height=window.innerHeight;
}

document.addEventListener("keydown",(e)=>keys[e.key]=true);
document.addEventListener("keyup",(e)=>keys[e.key]=false);

window.addEventListener("touchstart",()=>{
    document.getElementById("touchControls").style.display="block";
    document.getElementById("fireBtn").style.display="block";
},{once:true});

function bindBtn(id,on){
    let el=document.getElementById(id);
    el.addEventListener("touchstart",e=>{e.preventDefault();keys[on]=true;});
    el.addEventListener("touchend",e=>{e.preventDefault();keys[on]=false;});
}
bindBtn("up","ArrowUp");
bindBtn("down","ArrowDown");
bindBtn("left","ArrowLeft");
bindBtn("right","ArrowRight");

document.getElementById("fireBtn").addEventListener("touchstart",()=>keys[" "]=true);
document.getElementById("fireBtn").addEventListener("touchend",()=>keys[" "]=false);

function spawnStar(){
    return{ x:Math.random()*200-100, y:Math.random()*200-100, z:Math.random()*300+50 };
}

function spawnEnemy(){
    enemies.push({ x:Math.random()*20-10, y:Math.random()*10-5, z:ship.z+150 });
}
setInterval(()=>{ if(!gameOver && !paused) spawnEnemy(); },1200);

function spawnWall(){
    walls.push({ x:Math.random()<0.5?-12:12, y:Math.random()*10-5, z:ship.z+120 });
}
setInterval(()=>{ if(!gameOver && !paused) spawnWall(); },900);

function triggerGameOver(){
    gameOver=true;
    finalScore.textContent="Score: "+score;
    best=Math.max(best,score);
    bestScore.textContent="Best: "+best;
    document.getElementById("gameOverPanel").style.display="block";
}

function restartGame(){
    document.getElementById("gameOverPanel").style.display="none";
    startGame();
}

function loop(){
    if(!paused && !gameOver) update();
    draw();
    requestAnimationFrame(loop);
}

function update(){
    if(keys["ArrowUp"]) ship.y-=0.12;
    if(keys["ArrowDown"]) ship.y+=0.12;
    if(keys["ArrowLeft"]) ship.x-=0.12;
    if(keys["ArrowRight"]) ship.x+=0.12;

    if(keys[" "]){
        lasers.push({x:ship.x+0.5,y:ship.y,z:ship.z+5});
        lasers.push({x:ship.x-0.5,y:ship.y,z:ship.z+5});
    }

    ship.z += speed;
    score++;
    speed+=0.0003;

    lasers.forEach(l=>l.z+=1.5);
    lasers=lasers.filter(l=>l.z<ship.z+200);

    enemies.forEach(e=>{
        e.z-=0.35;
        if(Math.abs(e.x-ship.x)<1&&Math.abs(e.y-ship.y)<1&&e.z<ship.z+3) triggerGameOver();
    });

    enemies=enemies.filter(e=>{
        let hit=lasers.some(l=>Math.abs(l.x-e.x)<1&&Math.abs(l.y-e.y)<1&&Math.abs(l.z-e.z)<2);
        if(hit) score+=20;
        return !hit;
    });

    walls.forEach(w=>{
        w.z-=0.35;
        if(Math.abs(w.x-ship.x)<1.5&&Math.abs(w.y-ship.y)<1.5&&w.z<ship.z+4) triggerGameOver();
        let hit=lasers.some(l=>Math.abs(l.x-w.x)<2&&Math.abs(l.y-w.y)<2&&Math.abs(l.z-w.z)<2);
        if(hit) w.dead=true;
    });
    walls=walls.filter(w=>!w.dead);

    scoreElement=document.getElementById("score");
    scoreElement.textContent=score;
}

function project(x,y,z){
    let dz=z-ship.z+1;
    let f=200/dz;
    return{
        x:canvas.width/2+x*f,
        y:canvas.height/2+y*f
    };
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Stars
    stars.forEach(s=>{
        s.z-=0.5;
        if(s.z<1) Object.assign(s,spawnStar());
        let p=project(s.x,s.y,s.z);
        ctx.fillStyle="#fff";
        ctx.fillRect(p.x,p.y,2,2);
    });

    // Walls
    walls.forEach(w=>{
        let p=project(w.x,w.y,w.z);
        ctx.fillStyle="#00e5ff";
        ctx.fillRect(p.x-15,p.y-25,30,50);
    });

    // Enemies
    enemies.forEach(e=>{
        let p=project(e.x,e.y,e.z);
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(p.x,p.y,12,0,Math.PI*2);
        ctx.fill();
    });

    // Lasers
    lasers.forEach(l=>{
        let p=project(l.x,l.y,l.z);
        ctx.fillStyle="#00e5ff";
        ctx.fillRect(p.x-2,p.y-10,4,20);
    });

    // Ship
    let p=project(ship.x,ship.y,ship.z+5);
    ctx.fillStyle="#00e5ff";
    ctx.beginPath();
    ctx.arc(p.x,p.y,14,0,Math.PI*2);
    ctx.fill();
}

pauseBtn.onclick=()=>paused=!paused;

//////////////////////////////////////////////////
// SERVICE WORKER (OFFLINE AFTER FIRST VISIT)
//////////////////////////////////////////////////
const swBlob=new Blob([`
self.addEventListener("install",e=>{
    e.waitUntil(caches.open("echosearch-offline").then(c=>c.addAll(["./"])));
});
self.addEventListener("fetch",e=>{
    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
});
`],{type:"text/javascript"});
navigator.serviceWorker.register(URL.createObjectURL(swBlob));

</script>

</body>
</html>
